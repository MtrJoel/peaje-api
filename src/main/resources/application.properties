# 1. Habilitar la consola de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 2. Configuración obligatoria del DataSource para evitar que Spring use una URL aleatoria
spring.datasource.url=jdbc:h2:mem:peajedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 3. Decirle a Hibernate que cree las tablas automáticamente en H2
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update